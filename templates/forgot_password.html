<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Open Humana</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='50' font-weight='bold' font-family='Arial'>OH</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa; color: #1a1a1a; min-height: 100vh;
      overflow-x: hidden; -webkit-font-smoothing: antialiased;
    }
    .login-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    .login-orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
      animation: orbFloat 20s ease-in-out infinite;
    }
    .login-orb-1 { width: 600px; height: 600px; background: #c8c8d0; top: -200px; left: -100px; }
    .login-orb-2 { width: 500px; height: 500px; background: #d8d8e0; bottom: -150px; right: -100px; animation-delay: -7s; }
    .login-orb-3 { width: 300px; height: 300px; background: #e0e0e8; top: 50%; left: 60%; animation-delay: -14s; opacity: 0.08; }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -20px) scale(1.05); }
      50% { transform: translate(-20px, 30px) scale(0.95); }
      75% { transform: translate(20px, 10px) scale(1.02); }
    }
    .login-grid {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(26,26,26,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,26,26,0.03) 1px, transparent 1px);
      background-size: 60px 60px; z-index: 0;
    }
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative; z-index: 2;
    }
    .login-card {
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(0,0,0,0.08); border-radius: 24px;
      padding: 48px 40px; width: 100%; max-width: 420px; text-align: center;
      animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.03), 0 20px 50px -12px rgba(0,0,0,0.08), 0 0 80px -20px rgba(26,26,26,0.1);
    }
    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .login-logo { margin-bottom: 8px; }
    .login-logo img { height: 80px; width: auto; }
    .login-subtitle {
      font-size: 14px; color: #666; margin-bottom: 32px;
      animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
    }
    .login-form label {
      display: block; text-align: left; font-size: 12px; font-weight: 600;
      color: #666; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px;
    }
    .input-wrap { position: relative; margin-bottom: 16px; }
    .input-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; stroke: #666; pointer-events: none; transition: stroke 0.2s;
    }
    .input-wrap input:focus ~ svg { stroke: #1a1a2e; }
    .login-card input[type="text"],
    .login-card input[type="email"],
    .login-card input[type="password"] {
      width: 100%; padding: 14px 16px 14px 44px;
      background: #f5f5f5; border: 2px solid #ccc; border-radius: 14px;
      color: #1a1a1a; font-size: 15px; font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); outline: none;
    }
    .login-card input:focus {
      border-color: #1a1a2e; box-shadow: 0 0 0 3px rgba(26,26,46,0.1);
      background: rgba(26,26,46,0.01);
    }
    .login-card input::placeholder { color: #666; opacity: 0.5; }
    .login-btn {
      width: 100%; padding: 14px 24px; background: #1a1a2e; color: #fff;
      border: none; border-radius: 14px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; position: relative; overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 16px -2px rgba(26,26,46,0.3); margin-top: 8px;
    }
    .login-btn:hover {
      background: #111122; box-shadow: 0 8px 30px -4px rgba(26,26,46,0.4);
      transform: translateY(-2px);
    }
    .login-btn:active { transform: translateY(0) scale(0.98); }
    .login-btn::after {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .login-btn:hover::after { left: 100%; }
    .login-error {
      background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15);
      color: #dc2626; padding: 12px 16px; border-radius: 12px;
      font-size: 13px; font-weight: 500; margin-bottom: 20px;
      animation: shakeX 0.5s ease;
    }
    .login-success {
      background: rgba(52,168,83,0.1); border: 1px solid rgba(52,168,83,0.2);
      color: #15803d; padding: 12px 16px; border-radius: 12px;
      font-size: 13px; font-weight: 500; margin-bottom: 20px;
    }
    @keyframes shakeX {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    .login-toggle {
      margin-top: 20px; font-size: 13px; color: #666;
      animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.35s backwards;
    }
    .login-toggle a { color: #1a1a2e; text-decoration: none; font-weight: 600; }
    .login-toggle a:hover { text-decoration: underline; }
    .login-footer {
      margin-top: 24px; font-size: 12px; color: #666; opacity: 0.5;
      animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s backwards;
    }
    @media (max-width: 480px) { .login-card { padding: 36px 24px; margin: 0 8px; } }
  </style>
</head>
<body>

  <div class="login-bg">
    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>
    <div class="login-orb login-orb-3"></div>
  </div>
  <div class="login-grid"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="/static/images/logo.png" alt="Open Humana">
      </div>
      <div class="login-subtitle">Reset your password</div>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}
      {% if success %}
      <div class="login-success">{{ success }}</div>
      {% endif %}

      <form method="POST" class="login-form">
        <label>Email Address</label>
        <div class="input-wrap">
          <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <button type="submit" class="login-btn">Send Reset Link</button>
      </form>

      <div class="login-toggle">
        <a href="/login">Back to Login</a>
      </div>

      <div class="login-footer">Open Humana &copy; 2026</div>
    </div>
  </div>

</body>
</html>
